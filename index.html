<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Type Coercion Visualizer</title>
<meta name="description" content="Interactive JavaScript type coercion visualizer. == vs ===, Abstract Equality, ToPrimitive, ToNumber, ToString. Step-through coercion algorithm with truth table.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:#111128;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:1.1rem;color:#e599f7}
.tab-bar{display:flex;gap:0;margin-left:auto}
.tab-bar button{padding:8px 16px;border:1px solid #3a3a6a;background:#1a1a3a;color:#aaa;cursor:pointer;font-size:.82rem}
.tab-bar button:first-child{border-radius:6px 0 0 6px}
.tab-bar button:last-child{border-radius:0 6px 6px 0}
.tab-bar button.active{background:#7048e8;border-color:#845ef7;color:#fff}
.main{flex:1;overflow:auto;padding:16px}
.panel{background:#111128;border:1px solid #2a2a4a;border-radius:8px;padding:16px;margin-bottom:12px;max-width:1100px;margin-left:auto;margin-right:auto}
.panel h3{font-size:.9rem;margin-bottom:10px;color:#e599f7}
.compare-row{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.compare-input{padding:8px 12px;border:1px solid #3a3a6a;border-radius:6px;background:#0d0d20;color:#e0e0e0;font-family:monospace;font-size:.95rem;width:180px}
.compare-op{padding:6px 14px;border-radius:6px;font-family:monospace;font-size:1rem;font-weight:700;cursor:pointer;border:2px solid}
.op-loose{border-color:#e599f7;color:#e599f7;background:rgba(229,153,247,.1)}
.op-strict{border-color:#4dabf7;color:#4dabf7;background:rgba(77,171,247,.1)}
.compare-btn{padding:8px 18px;border:1px solid #3a3a6a;border-radius:6px;background:#7048e8;color:#fff;cursor:pointer;font-size:.85rem}
.result-box{padding:12px 20px;border-radius:8px;font-family:monospace;font-size:1.2rem;font-weight:700;text-align:center;margin-bottom:12px}
.result-true{background:rgba(105,219,124,.15);border:2px solid #69db7c;color:#69db7c}
.result-false{background:rgba(255,107,107,.1);border:2px solid #ff6b6b;color:#ff6b6b}
.step{padding:8px 12px;border-radius:6px;margin:4px 0;font-size:.8rem;border-left:3px solid #2a2a4a;background:#0d0d20;line-height:1.5}
.step-check{border-left-color:#ffd43b}
.step-convert{border-left-color:#e599f7}
.step-result{border-left-color:#69db7c;font-weight:600}
.step-fail{border-left-color:#ff6b6b}
.step .code{font-family:monospace;color:#ffd43b;background:rgba(255,212,59,.1);padding:0 4px;border-radius:3px}
.truth-table{overflow-x:auto}
.tt{border-collapse:collapse;font-size:.7rem;font-family:monospace}
.tt th{padding:4px 6px;background:#1a1a3a;border:1px solid #2a2a4a;color:#888;min-width:40px;white-space:nowrap}
.tt td{padding:4px 6px;border:1px solid #2a2a4a;text-align:center;min-width:40px}
.tt-true{background:rgba(105,219,124,.2);color:#69db7c}
.tt-false{background:rgba(255,107,107,.08);color:#ff6b6b}
.tt .tt-header{background:#0d0d20;color:#e599f7;font-weight:700}
.info-card{background:#0d0d20;border:1px solid #2a2a4a;border-radius:6px;padding:10px;margin-bottom:8px}
.info-card h4{font-size:.8rem;margin-bottom:6px;color:#e599f7}
.info-card p{font-size:.75rem;line-height:1.5;color:#aaa}
.ref-table{width:100%;border-collapse:collapse;font-size:.73rem}
.ref-table th{text-align:left;padding:5px 8px;border-bottom:1px solid #2a2a4a;color:#e599f7}
.ref-table td{padding:5px 8px;border-bottom:1px solid #1a1a3a;font-family:monospace}
.coerce-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
@media(max-width:700px){.compare-row{flex-direction:column;align-items:stretch}.compare-input{width:100%}}
</style>
</head>
<body>
<header>
<h1>JS Type Coercion</h1>
<div class="tab-bar">
<button class="active" onclick="switchView('compare')">Compare</button>
<button onclick="switchView('table')">Truth Table</button>
<button onclick="switchView('reference')">Reference</button>
</div>
</header>
<div class="main" id="mainContent"></div>
<script>
let currentView='compare';
const VALUES=['false','0','""','null','undefined','NaN','true','1','"1"','[]','{}','"0"','[0]','"false"','-0','0n'];
const LABELS=['false','0','""','null','undefined','NaN','true','1','"1"','[]','{}','"0"','[0]','"false"','-0','0n'];

function evalVal(s){
  try{
    if(s==='-0')return -0;
    if(s==='0n')return 0n;
    return eval('('+s+')');
  }catch(e){return undefined}
}

function switchView(v){
  currentView=v;
  document.querySelectorAll('.tab-bar button').forEach((b,i)=>b.classList.toggle('active',['compare','table','reference'][i]===v));
  render();
}

function render(){
  const el=document.getElementById('mainContent');
  if(currentView==='compare')renderCompare(el);
  else if(currentView==='table')renderTable(el);
  else renderReference(el);
}

function renderCompare(el){
  el.innerHTML=`
  <div class="panel">
  <h3>Compare Two Values</h3>
  <div class="compare-row">
    <input class="compare-input" id="leftVal" value='0' placeholder="Left value">
    <span class="compare-op op-loose" id="opBtn" onclick="toggleOp()">==</span>
    <input class="compare-input" id="rightVal" value='"0"' placeholder="Right value">
    <button class="compare-btn" onclick="doCompare()">Compare</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${['false','0','""','null','undefined','NaN','true','1','"1"','[]','{}','"0"','-0','Infinity'].map(v=>
      `<button style="padding:3px 8px;border:1px solid #2a2a4a;border-radius:10px;background:#111128;color:#aaa;cursor:pointer;font-size:.7rem;font-family:monospace" onclick="quickSet('${v.replace(/'/g,"\\'")}')">${v}</button>`
    ).join('')}
  </div>
  <div id="compareResult"></div>
  </div>
  <div class="panel" id="stepsPanel"><h3>Coercion Steps</h3><div id="steps"><p style="color:#555;font-size:.8rem">Click Compare to see the step-by-step coercion algorithm.</p></div></div>`;
  doCompare();
}

let isStrict=false;
function toggleOp(){
  isStrict=!isStrict;
  const btn=document.getElementById('opBtn');
  btn.textContent=isStrict?'===':'==';
  btn.className='compare-op '+(isStrict?'op-strict':'op-loose');
  doCompare();
}

function quickSet(v){
  const l=document.getElementById('leftVal');
  const r=document.getElementById('rightVal');
  if(document.activeElement===r)r.value=v;
  else l.value=v;
  doCompare();
}

function doCompare(){
  const lStr=document.getElementById('leftVal').value.trim();
  const rStr=document.getElementById('rightVal').value.trim();
  const lVal=evalVal(lStr);
  const rVal=evalVal(rStr);
  let result;
  try{result=isStrict?lVal===rVal:lVal==rVal}catch(e){result=false}

  document.getElementById('compareResult').innerHTML=`<div class="result-box ${result?'result-true':'result-false'}">${lStr} ${isStrict?'===':'=='} ${rStr} → ${result}</div>`;

  // Steps
  const steps=isStrict?getStrictSteps(lVal,rVal,lStr,rStr):getLooseSteps(lVal,rVal,lStr,rStr);
  document.getElementById('steps').innerHTML=steps.map(s=>
    `<div class="step ${s.type==='check'?'step-check':s.type==='convert'?'step-convert':s.type==='result'?'step-result':'step-fail'}">${s.msg}</div>`
  ).join('');
}

function typeOf(v){
  if(v===null)return'null';
  if(typeof v==='bigint')return'bigint';
  if(typeof v==='object')return Array.isArray(v)?'array':'object';
  return typeof v;
}

function getStrictSteps(l,r,lStr,rStr){
  const steps=[];
  const lt=typeof l,rt=typeof r;
  steps.push({type:'check',msg:`Types: <span class="code">${lt}</span> vs <span class="code">${rt}</span>`});
  if(lt!==rt){
    steps.push({type:'fail',msg:`Different types → <span class="code">false</span>. Strict equality (===) never coerces.`});
  }else{
    if(lt==='number'){
      if(isNaN(l)||isNaN(r))steps.push({type:'fail',msg:`NaN !== NaN (NaN is not equal to anything, including itself)`});
      else if(l===r)steps.push({type:'result',msg:`Same number value → <span class="code">true</span> (Note: +0 === -0 is true)`});
      else steps.push({type:'fail',msg:`Different number values → <span class="code">false</span>`});
    }else if(lt==='string'){
      steps.push({type:l===r?'result':'fail',msg:`String comparison: "${l}" ${l===r?'===':'!=='} "${r}" → <span class="code">${l===r}</span>`});
    }else if(lt==='boolean'){
      steps.push({type:l===r?'result':'fail',msg:`Boolean comparison → <span class="code">${l===r}</span>`});
    }else if(lt==='object'){
      steps.push({type:l===r?'result':'fail',msg:`Reference equality: same object? → <span class="code">${l===r}</span> (objects compare by reference, not value)`});
    }else{
      steps.push({type:l===r?'result':'fail',msg:`Same type, same value? → <span class="code">${l===r}</span>`});
    }
  }
  return steps;
}

function getLooseSteps(l,r,lStr,rStr){
  const steps=[];
  const lt=typeOf(l),rt=typeOf(r);
  steps.push({type:'check',msg:`Types: <span class="code">${lStr}</span> (${lt}) vs <span class="code">${rStr}</span> (${rt})`});

  // Same type
  if(lt===rt||(lt==='null'&&rt==='undefined')||(lt==='undefined'&&rt==='null')){
    if(lt===rt){
      steps.push({type:'check',msg:'Same type → use strict comparison (no coercion needed)'});
      if(lt==='number'&&(isNaN(l)||isNaN(r)))steps.push({type:'fail',msg:'NaN == NaN → false'});
      else steps.push({type:l==r?'result':'fail',msg:`Result: <span class="code">${l==r}</span>`});
    }else{
      steps.push({type:'result',msg:`null == undefined → <span class="code">true</span> (special rule: null and undefined are only equal to each other)`});
    }
    return steps;
  }

  // Number vs String
  if((lt==='number'&&rt==='string')||(lt==='string'&&rt==='number')){
    const strSide=lt==='string'?'left':'right';
    const strVal=lt==='string'?l:r;
    const numVal=Number(strVal);
    steps.push({type:'convert',msg:`${strSide} is string → ToNumber("${strVal}") = <span class="code">${numVal}</span>`});
    const numL=lt==='string'?numVal:l;
    const numR=rt==='string'?numVal:r;
    steps.push({type:numL==numR?'result':'fail',msg:`Compare numbers: ${numL} == ${numR} → <span class="code">${numL==numR}</span>`});
    return steps;
  }

  // Boolean vs anything
  if(lt==='boolean'||rt==='boolean'){
    const boolSide=lt==='boolean'?'left':'right';
    const boolVal=lt==='boolean'?l:r;
    const numVal=Number(boolVal);
    steps.push({type:'convert',msg:`${boolSide} is boolean → ToNumber(${boolVal}) = <span class="code">${numVal}</span>`});
    steps.push({type:'check',msg:'Now compare with the converted number (recursive)'});
    const newL=lt==='boolean'?numVal:l;
    const newR=rt==='boolean'?numVal:r;
    steps.push({type:newL==newR?'result':'fail',msg:`${newL} == ${rStr.includes('bool')?numVal:rStr} → <span class="code">${newL==newR}</span>`});
    return steps;
  }

  // Object vs primitive
  if((lt==='object'||lt==='array')&&(rt==='number'||rt==='string'||rt==='bigint')){
    steps.push({type:'convert',msg:`Left is object → ToPrimitive(${lStr})`});
    try{
      const prim=l.valueOf&&l.valueOf()!==l?l.valueOf():l.toString();
      steps.push({type:'convert',msg:`ToPrimitive result: <span class="code">${JSON.stringify(prim)}</span> (via ${l.valueOf&&l.valueOf()!==l?'valueOf()':'toString()'})`});
      steps.push({type:prim==r?'result':'fail',msg:`${JSON.stringify(prim)} == ${rStr} → <span class="code">${prim==r}</span>`});
    }catch(e){steps.push({type:'fail',msg:'ToPrimitive failed'});}
    return steps;
  }
  if((rt==='object'||rt==='array')&&(lt==='number'||lt==='string'||lt==='bigint')){
    steps.push({type:'convert',msg:`Right is object → ToPrimitive(${rStr})`});
    try{
      const prim=r.valueOf&&r.valueOf()!==r?r.valueOf():r.toString();
      steps.push({type:'convert',msg:`ToPrimitive result: <span class="code">${JSON.stringify(prim)}</span>`});
      steps.push({type:l==prim?'result':'fail',msg:`${lStr} == ${JSON.stringify(prim)} → <span class="code">${l==prim}</span>`});
    }catch(e){steps.push({type:'fail',msg:'ToPrimitive failed'});}
    return steps;
  }

  steps.push({type:'fail',msg:`No coercion rule matches → <span class="code">false</span>`});
  return steps;
}

function renderTable(el){
  const vals=VALUES.slice(0,14); // Skip bigint for table
  const labels=LABELS.slice(0,14);
  let html='<div class="panel"><h3>== Truth Table (Loose Equality)</h3><div class="truth-table"><table class="tt"><tr><th></th>';
  labels.forEach(l=>{html+=`<th class="tt-header">${l}</th>`});
  html+='</tr>';
  vals.forEach((v1,i)=>{
    html+=`<tr><th class="tt-header">${labels[i]}</th>`;
    vals.forEach((v2,j)=>{
      let result;
      try{result=evalVal(v1)==evalVal(v2)}catch(e){result=false}
      html+=`<td class="${result?'tt-true':'tt-false'}">${result?'✓':'✗'}</td>`;
    });
    html+='</tr>';
  });
  html+='</table></div></div>';

  html+='<div class="panel"><h3>=== Truth Table (Strict Equality)</h3><div class="truth-table"><table class="tt"><tr><th></th>';
  labels.forEach(l=>{html+=`<th class="tt-header">${l}</th>`});
  html+='</tr>';
  vals.forEach((v1,i)=>{
    html+=`<tr><th class="tt-header">${labels[i]}</th>`;
    vals.forEach((v2,j)=>{
      let result;
      try{result=evalVal(v1)===evalVal(v2)}catch(e){result=false}
      html+=`<td class="${result?'tt-true':'tt-false'}">${result?'✓':'✗'}</td>`;
    });
    html+='</tr>';
  });
  html+='</table></div></div>';
  el.innerHTML=html;
}

function renderReference(el){
  el.innerHTML=`
  <div class="panel"><h3>Abstract Equality Algorithm (==)</h3>
  <div class="coerce-grid">
  <div class="info-card"><h4>1. Same Type</h4><p>Use strict comparison (===). No coercion.</p></div>
  <div class="info-card"><h4>2. null == undefined</h4><p>Always true. They only equal each other (and nothing else).</p></div>
  <div class="info-card"><h4>3. Number == String</h4><p>Convert string to number: ToNumber(string). Then compare.</p></div>
  <div class="info-card"><h4>4. Boolean == Anything</h4><p>Convert boolean to number first: true→1, false→0. Then compare.</p></div>
  <div class="info-card"><h4>5. Object == Primitive</h4><p>Call ToPrimitive(object): try valueOf(), then toString(). Then compare.</p></div>
  <div class="info-card"><h4>6. Otherwise</h4><p>Return false.</p></div>
  </div></div>
  <div class="panel"><h3>Type Conversion Functions</h3>
  <table class="ref-table">
  <tr><th>Function</th><th>Input → Output</th></tr>
  <tr><td>ToNumber("")</td><td>0</td></tr>
  <tr><td>ToNumber("123")</td><td>123</td></tr>
  <tr><td>ToNumber("abc")</td><td>NaN</td></tr>
  <tr><td>ToNumber(true)</td><td>1</td></tr>
  <tr><td>ToNumber(false)</td><td>0</td></tr>
  <tr><td>ToNumber(null)</td><td>0</td></tr>
  <tr><td>ToNumber(undefined)</td><td>NaN</td></tr>
  <tr><td>ToNumber([])</td><td>0 (via "" → 0)</td></tr>
  <tr><td>ToNumber([1])</td><td>1 (via "1" → 1)</td></tr>
  <tr><td>ToNumber({})</td><td>NaN (via "[object Object]")</td></tr>
  </table></div>
  <div class="panel"><h3>ToPrimitive Algorithm</h3>
  <table class="ref-table">
  <tr><th>Step</th><th>Description</th></tr>
  <tr><td>1</td><td>If [Symbol.toPrimitive] exists, call it with hint</td></tr>
  <tr><td>2</td><td>If hint is "number": try valueOf() first, then toString()</td></tr>
  <tr><td>3</td><td>If hint is "string": try toString() first, then valueOf()</td></tr>
  <tr><td>4</td><td>Default hint for == is "number" (except Date → "string")</td></tr>
  </table></div>
  <div class="panel"><h3>Infamous Examples</h3>
  <table class="ref-table">
  <tr><th>Expression</th><th>Result</th><th>Why</th></tr>
  <tr><td>[] == false</td><td>true</td><td>[] → "" → 0, false → 0</td></tr>
  <tr><td>[] == ![]</td><td>true</td><td>![] is false, [] → 0, false → 0</td></tr>
  <tr><td>"" == false</td><td>true</td><td>"" → 0, false → 0</td></tr>
  <tr><td>"0" == false</td><td>true</td><td>"0" → 0, false → 0</td></tr>
  <tr><td>null == 0</td><td>false</td><td>null only == undefined</td></tr>
  <tr><td>NaN == NaN</td><td>false</td><td>NaN is never equal to anything</td></tr>
  <tr><td>" \\t\\n" == 0</td><td>true</td><td>Whitespace string → 0</td></tr>
  </table></div>`;
}

render();
</script>
</body>
</html>
